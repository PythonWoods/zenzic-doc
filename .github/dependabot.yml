version: 2
updates:
  # npm dependencies (Docusaurus, React, Tailwind, etc.)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "chore(deps)"
    groups:
      docusaurus-all:
        patterns:
          - "@docusaurus/*"
          - "docusaurus*"
        update-types:
          - minor
          - patch
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions-all:
        update-types:
          - minor
          - patch
