name: docs-ci

on:
  pull_request:
    branches:
      - main
      - 'release/**'
    paths:
      - 'docs/**'
      - 'i18n/**'
      - 'src/**'
      - 'static/**'
      - 'scripts/**'
      - 'docusaurus.config.ts'
      - 'sidebars.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'zenzic.toml'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - 'docs/**'
      - 'i18n/**'
      - 'src/**'
      - 'static/**'
      - 'scripts/**'
      - 'docusaurus.config.ts'
      - 'sidebars.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'zenzic.toml'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

concurrency:
  group: docs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build documentation
        run: npm run build

  sentinel:
    name: Zenzic Sentinel Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Zenzic Documentation Audit
        run: uvx zenzic check all --engine docusaurus --strict
