name: npm-audit

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/npm-audit.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/npm-audit.yml'
  schedule:
    - cron: '42 3 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+) with temporary allowlist
        run: |
          npx --yes audit-ci@^7 \
            --high \
            --report-type summary \
            --allowlist GHSA-5c6j-r48x-rmvq \
            --allowlist GHSA-qj8w-gfj5-8c6v
