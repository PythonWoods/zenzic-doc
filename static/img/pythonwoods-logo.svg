<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="PythonWoods — Obsidian Lattice">
  <defs>
    <clipPath id="avatarClip">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>

  <!-- Hex lattice — clipped to avatar circle -->
  <!-- Pointy-top hexagons, circumradius r=28, centers on a hex grid -->
  <!-- Ring 0: central hex, center (100,100) -->
  <!-- Ring 1: 6 adjacent hexes -->
  <!-- Ring 2: 12 partial hexes (mostly clipped) -->
  <g clip-path="url(#avatarClip)" fill="none" stroke="#4f46e5" stroke-linecap="round" stroke-linejoin="round">

    <!-- Ring 0 -->
    <polygon points="100,72 124,86 124,114 100,128 76,114 76,86" stroke-width="1.4" opacity="0.92"/>

    <!-- Ring 1 — E, NE, NW, W, SW, SE -->
    <polygon points="149,72 173,86 173,114 149,128 124,114 124,86" stroke-width="1.1" opacity="0.58"/>
    <polygon points="124,30 149,44 149,72 124,86 100,72 100,44"   stroke-width="1.1" opacity="0.58"/>
    <polygon points="76,30  100,44 100,72 76,86  52,72  52,44"   stroke-width="1.1" opacity="0.58"/>
    <polygon points="52,72  76,86  76,114 52,128 27,114 27,86"   stroke-width="1.1" opacity="0.58"/>
    <polygon points="76,114 100,128 100,156 76,170 52,156 52,128" stroke-width="1.1" opacity="0.58"/>
    <polygon points="124,114 149,128 149,156 124,170 100,156 100,128" stroke-width="1.1" opacity="0.58"/>

    <!-- Ring 2 — partially clipped, creates depth at edges -->
    <polygon points="100,-12 124,2   124,30  100,44  76,30  76,2"   stroke-width="0.85" opacity="0.28"/>
    <polygon points="100,156 124,170 124,198 100,212 76,198 76,170" stroke-width="0.85" opacity="0.28"/>
    <polygon points="173,30  197,44  197,72  173,86  149,72  149,44" stroke-width="0.85" opacity="0.28"/>
    <polygon points="27,30   52,44   52,72   27,86   3,72    3,44"   stroke-width="0.85" opacity="0.28"/>
    <polygon points="173,114 197,128 197,156 173,170 149,156 149,128" stroke-width="0.85" opacity="0.28"/>
    <polygon points="27,114  52,128  52,156  27,170  3,156   3,128"  stroke-width="0.85" opacity="0.28"/>
    <polygon points="197,72  221,86  221,114 197,128 173,114 173,86" stroke-width="0.7"  opacity="0.15"/>
    <polygon points="3,72    27,86   27,114  3,128  -21,114 -21,86"  stroke-width="0.7"  opacity="0.15"/>
  </g>

  <!-- Cyan lattice nodes — ring 0 vertices (brightest) -->
  <circle cx="100" cy="72"  r="3.0" fill="#22d3ee" opacity="0.95"/>
  <circle cx="124" cy="86"  r="3.0" fill="#22d3ee" opacity="0.95"/>
  <circle cx="124" cy="114" r="3.0" fill="#22d3ee" opacity="0.95"/>
  <circle cx="100" cy="128" r="3.0" fill="#22d3ee" opacity="0.95"/>
  <circle cx="76"  cy="114" r="3.0" fill="#22d3ee" opacity="0.95"/>
  <circle cx="76"  cy="86"  r="3.0" fill="#22d3ee" opacity="0.95"/>

  <!-- Indigo nodes — ring 1 outer vertices -->
  <circle cx="149" cy="72"  r="2.1" fill="#818cf8" opacity="0.75"/>
  <circle cx="173" cy="86"  r="2.1" fill="#818cf8" opacity="0.65"/>
  <circle cx="173" cy="114" r="2.1" fill="#818cf8" opacity="0.65"/>
  <circle cx="149" cy="128" r="2.1" fill="#818cf8" opacity="0.75"/>
  <circle cx="124" cy="30"  r="2.1" fill="#818cf8" opacity="0.75"/>
  <circle cx="149" cy="44"  r="2.1" fill="#818cf8" opacity="0.65"/>
  <circle cx="100" cy="44"  r="2.1" fill="#818cf8" opacity="0.75"/>
  <circle cx="76"  cy="30"  r="2.1" fill="#818cf8" opacity="0.75"/>
  <circle cx="52"  cy="44"  r="2.1" fill="#818cf8" opacity="0.65"/>
  <circle cx="27"  cy="86"  r="2.1" fill="#818cf8" opacity="0.65"/>
  <circle cx="27"  cy="114" r="2.1" fill="#818cf8" opacity="0.65"/>
  <circle cx="52"  cy="128" r="2.1" fill="#818cf8" opacity="0.75"/>
  <circle cx="52"  cy="156" r="2.1" fill="#818cf8" opacity="0.65"/>
  <circle cx="76"  cy="170" r="2.1" fill="#818cf8" opacity="0.75"/>
  <circle cx="100" cy="156" r="2.1" fill="#818cf8" opacity="0.75"/>
  <circle cx="124" cy="170" r="2.1" fill="#818cf8" opacity="0.75"/>
  <circle cx="149" cy="156" r="2.1" fill="#818cf8" opacity="0.65"/>
  <circle cx="52"  cy="72"  r="2.1" fill="#818cf8" opacity="0.65"/>

  <!-- Centre node: Indigo core, Cyan pulse -->
  <circle cx="100" cy="100" r="5.5" fill="#4f46e5" opacity="0.88"/>
  <circle cx="100" cy="100" r="3.2" fill="#22d3ee" opacity="1"/>

  <!-- Avatar ring border -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#4f46e5" stroke-width="1.6" opacity="0.45"/>
  <circle cx="100" cy="100" r="99" fill="none" stroke="#22d3ee" stroke-width="0.6" opacity="0.22"/>
</svg>
